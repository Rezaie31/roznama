<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>داشبورد | روزنما</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="loading-screen">
  <div class="logo-pulse"></div>
  <div class="logo-text">در حال بارگذاری روزنما...</div>
</div>

<div class="dash-wrap" id="dash-wrap">
  <div class="dash-header">
    <div>
      <h1>روزنما</h1>
      <div class="welcome mono" id="welcome-msg"></div>
    </div>
    <div class="actions">
      <div class="today-ring-wrap">
        <svg id="today-ring" width="40" height="40" viewBox="0 0 40 40"></svg>
        <span class="ring-num" id="today-ring-num"></span>
      </div>
      <button class="theme-toggle wiggle-hover" id="theme-toggle" onclick="toggleTheme()" aria-label="تغییر حالت روشن/تاریک">🌙</button>
      <button class="btn btn-danger" onclick="logout()">خروج</button>
    </div>
  </div>

  <!-- ===== استقبال + دیروز ===== -->
  <div class="welcome-hero" id="welcome-hero">
    <div class="welcome-hero-glow"></div>
    <div class="welcome-hero-inner">
      <h2 class="greeting" id="greeting-text"></h2>
      <div class="hero-grid">
        <div class="hero-panel">
          <div class="panel-label">yesterday's tasks</div>
          <div id="yesterday-tasks-list" class="yesterday-tasks"></div>
          <div id="yesterday-tasks-empty" class="empty-hint" style="display:none">دیروز هنوز کاری تعریف نکرده بودی.</div>
        </div>

        <div class="hero-panel" id="reminder-panel" style="display:none">
          <div class="panel-label">yesterday's note</div>
          <p class="reminder-text" id="reminder-note-text"></p>
          <div class="reminder-actions" id="reminder-actions">
            <button class="btn btn-primary" onclick="respondToNote('accepted')"><span class="wiggle-hover">✅</span> قبول دارم، انجامش می‌دم</button>
            <button class="btn btn-ghost" onclick="respondToNote('rejected')"><span class="wiggle-hover">✋</span> فعلاً نه</button>
          </div>
          <div class="reminder-result" id="reminder-result" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== کارهای امروز ===== -->
  <div class="card">
    <h2><span class="wiggle-hover">✅</span> کارهای امروز</h2>

    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-label">
        <span id="progress-text"></span>
        <span id="progress-pct" class="mono"></span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>

    <div id="task-list"></div>
    <div id="task-empty" class="empty-hint" style="display:none"><span class="icon">🗒️</span>هنوز کاری اضافه نکردی. یکی پایین اضافه کن.</div>
    <div class="add-task-row">
      <input type="text" id="new-task-name" placeholder="مثلاً: یک ساعت ورزش" />
      <input type="text" id="new-task-target" class="target" placeholder="هدف (اختیاری)" />
      <button class="btn btn-primary" id="add-task-btn" onclick="addTask(this)">افزودن</button>
    </div>
  </div>

  <!-- ===== نمودارها ===== -->
  <div class="charts-grid">
    <div class="card">
      <h2><span class="wiggle-hover">📊</span> پیشرفت امروز</h2>
      <div class="chart-box"><canvas id="daily-chart"></canvas></div>
    </div>
    <div class="card">
      <h2><span class="wiggle-hover">📈</span> روند هفته اخیر</h2>
      <div class="chart-box"><canvas id="weekly-chart"></canvas></div>
      <div class="week-ring-wrap">
        <svg id="week-ring" width="110" height="110" viewBox="0 0 110 110"></svg>
        <div class="ring-legend" id="ring-legend"></div>
      </div>
    </div>
  </div>

  <!-- ===== نمودار ماهانه و سالانه ===== -->
  <div class="charts-grid">
    <div class="card">
      <div class="chart-head">
        <h2><span class="wiggle-hover">🗓️</span> نمودار ماهانه</h2>
        <input type="month" id="month-picker" class="picker mono" />
      </div>
      <div class="chart-box"><canvas id="monthly-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="chart-head">
        <h2><span class="wiggle-hover">📆</span> نمودار سالانه</h2>
        <select id="year-picker" class="picker mono"></select>
      </div>
      <div class="chart-box"><canvas id="yearly-chart"></canvas></div>
    </div>
  </div>

  <!-- ===== دفترچه یادداشت ===== -->
  <div class="card">
    <h2><span class="wiggle-hover">📓</span> دفترچه یادداشت</h2>
    <textarea class="journal" id="today-note" placeholder="امروز چی گذشت؟ چند خط بنویس..."></textarea>
    <div class="save-row">
      <button class="btn btn-primary" onclick="saveJournal(this)">ذخیره یادداشت امروز</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="config.js"></script>
<script src="api.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
